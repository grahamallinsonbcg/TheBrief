  - title: "Eugene Yan on LLM evaluators"
    url: "https://eugeneyan.com/writing/llm-evaluators/"
    source: "Eugene Yan"
<<<<<<< Updated upstream
    date: "2026-04-01"
    raw_text: "Practical evaluation framework discussion for applied agent and analytics workflows."
    streams: [data-analytics-agents, scaled-ai-use-cases]
=======
    date: "2026-04-03"
    raw_text: "Eugene Yan published a comprehensive framework for using LLMs as evaluators of other LLM outputs, covering when this approach is reliable versus when it breaks down. The post identifies key failure modes including self-preference bias, position bias, and verbosity bias that inflate scores when using the same model family to evaluate itself. Practical mitigation strategies include using a different model family as judge, calibrating against human labels, and decomposing evaluation into atomic criteria. The framework is directly applicable to teams building automated regression testing for AI applications."
    streams: [research-thought-leadership]
