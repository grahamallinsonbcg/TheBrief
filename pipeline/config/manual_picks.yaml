    date: "2026-04-03"
    raw_text: "Google DeepMind released Gemini 1.5 Pro with a breakthrough 1 million token context window, enabling analysis of entire codebases, hour-long videos, or large document collections in a single prompt. The model uses a mixture-of-experts architecture to maintain efficiency at this scale while matching Gemini 1.0 Ultra performance on most benchmarks. Retrieval and reasoning over long documents showed particular improvement, with near-perfect recall up to 1M tokens in needle-in-a-haystack tests. The model is available via Google AI Studio and the Vertex AI API with tiered pricing based on context length."
