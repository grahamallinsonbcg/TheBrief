name: Weekly Edition Pipeline

on:
  schedule:
    - cron: '0 7 * * 5'  # Every Friday at 07:00 UTC
  workflow_dispatch:       # Allow manual trigger from GitHub Actions tab

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Required to commit edition files back to the repo

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install pipeline dependencies
        run: pip install -r pipeline/requirements.txt

      - name: Run pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
        run: python pipeline/run.py --day fri

      - name: Commit and push edition output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add site/public/editions/ site/public/config/sources.public.json
          git diff --staged --quiet || git commit -m "chore: publish edition $(date -u +%Y-%m-%d-fri)"
          git pull --rebase origin main
          git push origin main
